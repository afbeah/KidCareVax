<ion-content>

  <div class="details-container">

    <div class="deatils-header">

      <h1>
        {{ child?.name || 'Criança' }}
      </h1>

      <p class="age">
        Nascimento: {{ child?.birthDate }}
      </p>

      <span class="status-ok">
        {{ vaccinationStatus }}
      </span>

    </div>

    <section class="history-section">

      <h2>
        Histórico Vacinal
      </h2>

      <div
        class="vaccine-card"
        *ngFor="let vaccine of vaccines">

        <h3>
          {{ vaccine.name }}
        </h3>

        <p>

          {{ vaccine.status }}

          <span *ngIf="vaccine.applicationDate">

            em {{ vaccine.applicationDate }}

          </span>

        </p>

      </div>

    </section>

    <section class="campaigns-section">

      <h2>
        Campanhas Elegíveis
      </h2>

      <div class="campaigns-card">

        <h3>
          Influenza 2026
        </h3>

        <p class="infoVax">
          Disponível para crianças de 6 meses a 5 anos.
        </p>

      </div>

    </section>

    <button
      class="btn-primary"
      routerLink="/add-vaccine">

      Registrar Vacina

    </button>

    <button
      class="btn-secondary"
      routerLink="/children">

      Voltar

    </button>

  </div>

</ion-content>
