<ion-content [fullscreen]="true">
  <div class="details-container">
    <div class="details-card">
      <div class="details-back" routerLink="/children">
        <ion-icon name="arrow-back-outline"></ion-icon>
        <span>Voltar</span>
      </div>

      <div class="details-header">
        <ion-icon class="page-icon" name="person-circle-outline"></ion-icon>
        <h1>{{ child?.name || "Criança" }}</h1>

        <div class="child-meta">
          <span>Nascimento</span>
          <strong>{{ child?.birthDate }}</strong>
        </div>

        <span
          class="status-badge"
          [ngClass]="{
            'status-ok': vaccinationStatus === 'Em dia',
            'status-warning': vaccinationStatus === 'Pendente',
            'status-danger': vaccinationStatus === 'Atrasada',
          }"
        >
          {{ vaccinationStatus }}
        </span>
      </div>

      <section class="history-section">
        <h2>
          <ion-icon name="medical-outline"></ion-icon>
          Histórico Vacinal
        </h2>

        <div class="vaccine-card" *ngFor="let vaccine of vaccines">
          <div>
            <h3>{{ vaccine.name }}</h3>

            <p>
              {{ vaccine.status }}

              <span *ngIf="vaccine.applicationDate">
                • {{ vaccine.applicationDate }}
              </span>
            </p>
          </div>
        </div>
      </section>

      <section class="campaigns-section">
        <h2>
          <ion-icon name="megaphone-outline"></ion-icon>
          Campanhas Elegíveis
        </h2>

        <div class="campaign-card">
          <h3>Influenza 2026</h3>

          <p>Disponível para crianças de 6 meses a 5 anos.</p>
        </div>
      </section>

      <button class="btn-primary" routerLink="/add-vaccine">
        <ion-icon name="add-circle-outline"></ion-icon>
        Registrar Vacina
      </button>
    </div>
  </div>
</ion-content>
