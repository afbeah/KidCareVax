<ion-content>

  <div class="campaigns-container">

    <div class="campaigns-header">

      <h1>
        Campanhas de Vacinação
      </h1>

      <p>
        Acompanhe campanhas ativas para o público infantil.
      </p>

    </div>

    <div
      class="campaign-card"
      *ngFor="let campaign of campaigns">

      <h2>
        {{ campaign.title }}
      </h2>

      <p>
        {{ campaign.description }}
      </p>

      <span class="status-active">
        {{ campaign.status }}
      </span>

    </div>

    <button
      class="btn-secondary"
      routerLink="/dashboard">

      Voltar

    </button>

  </div>

</ion-content>
